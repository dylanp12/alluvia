name: publish
on:
  push:
    tags:
      - v*
jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: pypi
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v8.3.2   # exact tag: setup-uv publishes no floating major alias
      - run: uv python install 3.13
      - run: uv build
      - run: uv publish
