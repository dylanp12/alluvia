<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="light dark">
<title>alluvia · your idea-map</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 96 96'%3E%3Crect width='96' height='96' rx='22' fill='%23131F26'/%3E%3Cg stroke='%23F4EFE6' stroke-width='11' stroke-linecap='round' fill='none'%3E%3Cpath d='M22 30C42 28 44 34 51 42'/%3E%3Cpath d='M22 66C42 68 44 62 51 54'/%3E%3Cpath d='M71 48H84'/%3E%3C/g%3E%3Ccircle cx='60' cy='48' r='11' fill='%23D4A017'/%3E%3C/svg%3E">
<style>
  /* alluvia — sediment & gold. rule 01: gold is scarce, and it is a FILLED mark
     (the found thing / active state), never text or a stroke on a light ground
     (Gold on Paper = 2.07:1). Tokens mirror assets/alluvia-tokens.css; the wheel
     ships only the package, so they live inline here. */
  :root{
    --ink:#1C2B33; --basin:#131F26; --paper:#F4EFE6; --wash:#E9E2D4;
    --silt:#A89F91; --silt-ink:#6F675B; --gold:#D4A017;
    /* semantic — light */
    --bg:var(--paper); --panel:var(--wash); --fg:var(--ink);
    --muted:var(--silt-ink);                                  /* readable 2ndary text on Paper (4.87:1) */
    --faint:var(--silt);                                      /* rules / decoration only on light */
    --line:color-mix(in srgb, var(--ink) 14%, transparent);
    --hover:color-mix(in srgb, var(--ink) 7%, transparent);
    --gold-ink:var(--ink);                                    /* text that sits ON a gold fill (6.13:1) */
    --edge:color-mix(in srgb, var(--fg) 42%, transparent);
    /* status — validated >=3:1 per ground; always paired with a dot + text label */
    --st-open:#B5533B; --st-resolved:#2E7D6F; --st-dormant:#6E7C87; --st-unknown:#8A8072;
    /* sources — categorical, legend-led; extras fold into --src-other */
    --src-1:#2E6E9E; --src-2:#C0562A; --src-3:#1E8C79; --src-other:var(--silt-ink);
    --mono:"IBM Plex Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
    --body:system-ui, -apple-system, "Segoe UI", sans-serif;
  }
  @media (prefers-color-scheme: dark){
    :root{
      --bg:var(--basin); --panel:#18262E; --fg:var(--paper);
      --muted:var(--silt);                                   /* silt is readable 2ndary text on Basin (6.42:1) */
      --faint:color-mix(in srgb, var(--paper) 45%, var(--basin));
      --line:color-mix(in srgb, var(--paper) 14%, transparent);
      --hover:color-mix(in srgb, var(--paper) 6%, transparent);
      --gold-ink:var(--basin);
      --edge:color-mix(in srgb, var(--fg) 38%, transparent);
      --st-open:#D07A5E; --st-resolved:#46A08F; --st-dormant:#8D9BA6; --st-unknown:#B4A992;
      --src-1:#5B9BD1; --src-2:#E07B4C; --src-3:#3FB39C;
    }
  }
  *{box-sizing:border-box;margin:0}
  body{background:var(--bg);color:var(--fg);font:14px/1.55 var(--body)}
  .mono{font-family:var(--mono)}
  /* survey-plate section labels: instrument lettering, not headings */
  h2{font-family:var(--mono);font-size:11px;color:var(--muted);text-transform:uppercase;
     letter-spacing:.14em;font-weight:500;margin-bottom:12px}
  header{display:flex;align-items:center;gap:18px;padding:16px 24px;border-bottom:1px solid var(--line)}
  header .brand{display:flex;align-items:center;color:var(--fg)}
  header .brand svg{height:30px;width:auto;display:block}
  header .sub{font-family:var(--mono);color:var(--muted);font-size:11px;letter-spacing:.06em;
     text-transform:uppercase;padding-left:18px;border-left:1px solid var(--line)}
  nav{display:flex;gap:2px;padding:8px 24px;border-bottom:1px solid var(--line)}
  nav button{background:none;border:0;color:var(--muted);padding:7px 14px;border-radius:6px;
     cursor:pointer;font-size:13px;font-family:var(--mono);letter-spacing:.03em}
  nav button:hover{background:var(--hover);color:var(--fg)}
  nav button.on{color:var(--fg);background:var(--panel);box-shadow:inset 0 -2px 0 var(--gold)} /* one active tab = scarce gold underline */
  main{padding:22px 24px;max-width:1200px;margin:0 auto}
  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px}
  .degraded{border:1px solid var(--line);border-left:3px solid var(--st-open);
     background:color-mix(in srgb,var(--st-open) 8%,transparent);
     border-radius:8px;padding:10px 14px;margin-bottom:14px;font-size:13px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:14px}
  .card .n{font-size:26px;font-weight:650;font-variant-numeric:tabular-nums}
  .card .l{color:var(--muted);font-size:11px;font-family:var(--mono);text-transform:uppercase;letter-spacing:.1em;margin-top:2px}
  .row{display:flex;gap:20px;margin-top:20px;flex-wrap:wrap}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:16px;flex:1;min-width:320px}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th{color:var(--muted);text-align:left;font-weight:500;padding:6px 8px;border-bottom:1px solid var(--line);
     font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.08em}
  td{padding:6px 8px;border-bottom:1px solid var(--line);vertical-align:top}
  /* status chip: colored dot (shape) + text label — redundant, never colour alone */
  .tag{display:inline-flex;align-items:center;gap:5px;padding:1px 9px 1px 7px;border-radius:10px;
     font-size:11px;font-family:var(--mono);color:var(--fg);
     background:color-mix(in srgb,var(--dot) 15%,transparent);--dot:var(--faint)}
  .tag::before{content:"";width:7px;height:7px;border-radius:50%;background:var(--dot);flex:none}
  .tag.open{--dot:var(--st-open)} .tag.resolved{--dot:var(--st-resolved)}
  .tag.dormant{--dot:var(--st-dormant)} .tag.unknown{--dot:var(--st-unknown)}
  .tag.kept{--dot:var(--gold)} .tag.dismissed{--dot:var(--st-open)}
  .tag.pending{--dot:var(--st-dormant)} .tag.rejected{--dot:var(--st-unknown)}
  #bubbles,#graph,#tl{width:100%}
  .detail{color:var(--muted);font-size:13px;margin-top:10px;white-space:pre-wrap;font-family:var(--mono)}
  .muted-b{opacity:.4}
  svg text{fill:var(--fg)}
  .hint{color:var(--muted);font-size:12px;margin-top:8px;font-family:var(--mono)}
  /* a bridge is the found thing: a filled gold node marks it; the story is carried by ink text */
  .bridge{background:var(--panel);border:1px solid var(--line);border-radius:8px;
     padding:14px;margin-bottom:12px}
  .bridge .head{display:flex;align-items:center;gap:8px;color:var(--fg);font-weight:600;font-size:13px;margin-bottom:8px}
  .bridge .node{width:9px;height:9px;border-radius:50%;background:var(--gold);flex:none}
  .bridge .join{font-family:var(--mono);color:var(--muted)}
  .bridge .side{margin:6px 0;padding-left:10px;border-left:2px solid var(--line)}
  .bridge .src{color:var(--muted);font-size:11px;font-family:var(--mono)}
  .bridge .why{color:var(--fg);font-size:13px;margin-top:8px;font-style:italic}
  .chip{display:inline-block;padding:2px 10px;border:1px solid var(--line);border-radius:12px;
     color:var(--muted);font-size:12px;cursor:pointer;margin-right:6px;font-family:var(--mono)}
  .chip:hover{color:var(--fg)}
  .chip.on{border-color:var(--fg);color:var(--fg)}
  .split{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  @media(max-width:900px){.split{grid-template-columns:1fr}}
  .tlist tr{cursor:pointer} .tlist tr:hover td{background:var(--hover)}
  #q{margin-left:auto;background:var(--bg);border:1px solid var(--line);color:var(--fg);
     padding:7px 12px;border-radius:8px;width:300px;font-size:13px;outline:none;font-family:var(--mono)}
  #q::placeholder{color:var(--muted)}
  #q:focus{border-color:var(--fg)}
  #results{position:absolute;right:24px;top:64px;width:460px;max-height:60vh;overflow:auto;
     background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:10px;
     z-index:9;display:none;box-shadow:0 10px 34px rgba(19,31,38,.28)}
  #results .r{padding:8px;border-bottom:1px solid var(--line);cursor:pointer;font-size:13px}
  #results .r:hover{background:var(--hover)}
  #results .m{color:var(--muted);font-size:11px;font-family:var(--mono)}
</style>
</head>
<body>
<header>
  <div class="brand" aria-label="alluvia">
    <svg viewBox="0 0 538 83" role="img" aria-label="alluvia"><g transform="scale(0.86)"><path d="M 18.00 15.00 C 72.00 10.00 119.70 16.56 137.09 35.89" fill="none" stroke="currentColor" stroke-width="8.5" stroke-linecap="round"/><path d="M 18.00 48.00 C 62.00 41.00 102.00 55.00 131.70 48.00" fill="none" stroke="currentColor" stroke-width="8.5" stroke-linecap="round"/><path d="M 18.00 81.00 C 72.00 86.00 119.70 79.44 137.09 60.11" fill="none" stroke="currentColor" stroke-width="8.5" stroke-linecap="round"/><path d="M 164.3 48 L 222 48" fill="none" stroke="currentColor" stroke-width="8.5" stroke-linecap="round"/><circle cx="148" cy="48" r="9.5" fill="#D4A017"/></g><g transform="translate(234.4,-14.5) scale(0.95)"><g transform="translate(0.00,103.00) scale(0.100000,-0.100000)"><path d="M218 -15Q172 -15 131.5 3.0Q91 21 65.5 55.5Q40 90 40 141Q40 214 87.5 255.5Q135 297 241 313Q275 318 302.0 322.5Q329 327 345.5 336.5Q362 346 362 367Q362 382 353.5 394.0Q345 406 329.0 412.5Q313 419 289 419Q258 419 238.0 407.0Q218 395 205 379Q192 365 176.0 356.5Q160 348 139 348Q111 348 94.5 362.5Q78 377 78 402Q78 427 94.0 449.5Q110 472 138.5 490.0Q167 508 205.0 518.5Q243 529 287 529Q355 529 401.0 504.5Q447 480 470.5 436.0Q494 392 494 335V137Q494 124 497.0 119.5Q500 115 509 112Q525 106 539.0 92.0Q553 78 553 54Q553 27 533.5 8.0Q514 -11 477 -10Q436 -9 413.5 10.5Q391 30 385 62L384 69H381Q354 28 317.0 6.5Q280 -15 218 -15ZM247 98Q279 98 305.0 111.0Q331 124 346.5 148.0Q362 172 362 205V240Q362 243 360.5 243.0Q359 243 356 241Q344 233 327.0 229.0Q310 225 291.5 222.5Q273 220 254 215Q208 206 190.5 191.0Q173 176 173 153Q173 128 191.5 113.0Q210 98 247 98Z" fill="currentColor"/></g><g transform="translate(59.00,103.00) scale(0.100000,-0.100000)"><path d="M136 -10Q108 -10 89.0 9.5Q70 29 70 58V664Q70 692 89.0 711.0Q108 730 136 730Q165 730 184.0 711.0Q203 692 203 664V58Q203 29 184.0 9.5Q165 -10 136 -10Z" fill="currentColor"/></g><g transform="translate(87.80,103.00) scale(0.100000,-0.100000)"><path d="M136 -10Q108 -10 89.0 9.5Q70 29 70 58V664Q70 692 89.0 711.0Q108 730 136 730Q165 730 184.0 711.0Q203 692 203 664V58Q203 29 184.0 9.5Q165 -10 136 -10Z" fill="currentColor"/></g><g transform="translate(116.60,103.00) scale(0.100000,-0.100000)"><path d="M252 -10Q189 -10 147.5 13.5Q106 37 85.5 81.0Q65 125 65 188V464Q65 491 84.5 510.5Q104 530 131 530Q159 530 178.0 510.5Q197 491 197 464V210Q197 155 224.0 135.0Q251 115 294 115Q328 115 352.0 130.0Q376 145 389.0 169.5Q402 194 402 223V464Q402 491 421.5 510.5Q441 530 469 530Q497 530 516.0 510.5Q535 491 535 464V57Q535 30 516.0 10.5Q497 -9 469 -9Q441 -9 421.5 10.5Q402 30 402 57V123L429 110Q397 50 354.5 20.0Q312 -10 252 -10Z" fill="currentColor"/></g><g transform="translate(178.60,103.00) scale(0.100000,-0.100000)"><path d="M254 -11Q234 -11 216.0 0.5Q198 12 188 36L35 435Q27 454 32.0 474.5Q37 495 53.0 510.0Q69 525 95 525Q118 525 134.5 513.0Q151 501 158 483L275 178L249 175L370 483Q377 501 393.5 513.0Q410 525 430 525Q452 525 467.0 510.5Q482 496 488.0 475.5Q494 455 486 435L320 36Q311 14 292.5 1.5Q274 -11 254 -11Z" fill="currentColor"/></g><g transform="translate(232.10,103.00) scale(0.100000,-0.100000)"><path d="M137 -10Q109 -10 89.5 10.0Q70 30 70 57V459Q70 486 89.5 505.5Q109 525 137 525Q164 525 183.5 505.5Q203 486 203 459V57Q203 30 183.5 10.0Q164 -10 137 -10Z" fill="currentColor"/></g><g transform="translate(260.90,103.00) scale(0.100000,-0.100000)"><path d="M218 -15Q172 -15 131.5 3.0Q91 21 65.5 55.5Q40 90 40 141Q40 214 87.5 255.5Q135 297 241 313Q275 318 302.0 322.5Q329 327 345.5 336.5Q362 346 362 367Q362 382 353.5 394.0Q345 406 329.0 412.5Q313 419 289 419Q258 419 238.0 407.0Q218 395 205 379Q192 365 176.0 356.5Q160 348 139 348Q111 348 94.5 362.5Q78 377 78 402Q78 427 94.0 449.5Q110 472 138.5 490.0Q167 508 205.0 518.5Q243 529 287 529Q355 529 401.0 504.5Q447 480 470.5 436.0Q494 392 494 335V137Q494 124 497.0 119.5Q500 115 509 112Q525 106 539.0 92.0Q553 78 553 54Q553 27 533.5 8.0Q514 -11 477 -10Q436 -9 413.5 10.5Q391 30 385 62L384 69H381Q354 28 317.0 6.5Q280 -15 218 -15ZM247 98Q279 98 305.0 111.0Q331 124 346.5 148.0Q362 172 362 205V240Q362 243 360.5 243.0Q359 243 356 241Q344 233 327.0 229.0Q310 225 291.5 222.5Q273 220 254 215Q208 206 190.5 191.0Q173 176 173 153Q173 128 191.5 113.0Q210 98 247 98Z" fill="currentColor"/></g><circle cx="245.80" cy="37.70" r="8.78" fill="#D4A017"/></g></svg>
  </div>
  <span class="sub">local-first · your sessions never leave this machine</span>
  <input id="q" class="mono" placeholder="search your ideas…  ( / )" autocomplete="off">
</header>
<div id="results"></div>
<nav id="nav"></nav>
<main id="main"></main>
<script>
const TABS=["Overview","Themes","Connections","Timeline","Judgments"];
const state={tab:"Overview",data:{}};
const $=s=>document.querySelector(s);
const el=(t,attrs={},...kids)=>{const e=document.createElement(t);
  for(const[k,v]of Object.entries(attrs)){if(k==="class")e.className=v;else if(k.startsWith("on"))e[k]=v;else e.setAttribute(k,v);}
  kids.flat().forEach(k=>e.append(k));return e;};
async function api(name){if(!state.data[name]){const r=await fetch("/api/"+name);state.data[name]=await r.json();}return state.data[name];}
// status colours are CSS vars, so they follow the light/dark ground automatically
const SC={open:"var(--st-open)",resolved:"var(--st-resolved)",dormant:"var(--st-dormant)",unknown:"var(--st-unknown)"};
// sources: three validated categorical hues; any beyond the third fold into a neutral "other"
const SRC=["var(--src-1)","var(--src-2)","var(--src-3)"];
const srcColor=i=>i<SRC.length?SRC[i]:"var(--src-other)";

function nav(){const n=$("#nav");n.innerHTML="";TABS.forEach(t=>n.append(
  el("button",{class:t===state.tab?"on":"",onclick:()=>{state.tab=t;render();}},t)));}

async function render(){nav();const m=$("#main");m.innerHTML="loading…";
  try{await VIEWS[state.tab](m);}catch(e){m.textContent="error: "+e;}}

const VIEWS={
async Overview(m){const o=await api("overview");m.innerHTML="";
  if(o.refresh&&o.refresh.degraded){
    const when=o.refresh.retry_at?` — provider retry after ${o.refresh.retry_at.slice(0,16).replace("T"," ")} UTC`:"";
    m.append(el("div",{class:"degraded"},`⚠ last refresh was degraded by provider rate limits${when}. `+
      "Labels/statuses shown may be incomplete — re-run 'alluvia refresh' to finish the map."));}
  const cards=el("div",{class:"cards"});
  const add=(n,l)=>cards.append(el("div",{class:"card"},el("div",{class:"n"},String(n)),el("div",{class:"l"},l)));
  add(o.sessions,"sessions");add(o.notes,"notes");add(o.themes,"themes");add(o.links,"connections");
  add(o.proposals.total,"proposals");add(o.proposals.hit_rate==null?"—":o.proposals.hit_rate+"%","hit-rate");
  m.append(cards);
  const row=el("div",{class:"row"});
  const st=el("div",{class:"panel"},el("h2",{},"theme status"));
  const total=Object.values(o.status_mix).reduce((a,b)=>a+b,0)||1;let acc=0;
  const svg=`<svg viewBox="0 0 42 42" width="160" height="160">`+
    Object.entries(o.status_mix).map(([k,v])=>{const pct=v/total*100;
      const s=`<circle r="15.9" cx="21" cy="21" fill="none" stroke="${SC[k]||"var(--faint)"}" stroke-width="6"
        stroke-dasharray="${pct} ${100-pct}" stroke-dashoffset="${25-acc}"></circle>`;acc+=pct;return s;}).join("")+`</svg>`;
  st.insertAdjacentHTML("beforeend",svg);
  Object.entries(o.status_mix).forEach(([k,v])=>st.append(el("div",{},el("span",{class:"tag "+k},k)," "+v)));
  const src=el("div",{class:"panel"},el("h2",{},"sessions by source"));
  Object.entries(o.sources).forEach(([k,v])=>src.append(el("div",{},`${k}: ${v}`)));
  row.append(st,src);m.append(row);},

async Themes(m){const d=await api("themes");m.innerHTML="";
  const all=[...d.themes];let filter="all",sortBy="sessions";
  const wrap=el("div",{class:"split"});
  const left=el("div",{class:"panel"},el("h2",{},"map — sized by sessions, colored by status"));
  const right=el("div",{class:"panel"},el("h2",{},"themes"));
  const detail=el("div",{class:"detail"},"click a theme");
  const chips=el("div",{});
  ["all","open","resolved","dormant","unknown","muted"].forEach(f=>chips.append(
    el("span",{class:"chip"+(f===filter?" on":""),onclick:()=>{filter=f;draw();}},f)));
  const sortSel=el("select",{onchange:e=>{sortBy=e.target.value;draw();},
    style:"background:var(--bg);color:var(--fg);border:1px solid var(--line);border-radius:6px;padding:3px 8px;margin-left:8px;font-family:var(--mono)"},
    ...["sessions","notes","recent"].map(s=>el("option",{value:s},"sort: "+s)));
  right.append(chips,sortSel);
  const listBox=el("div",{});right.append(listBox,detail);
  const show=t=>{detail.textContent=`${t.label}${t.muted?"  [muted]":""}\n${t.sessions} sessions · ${t.sources} source(s) · ${t.notes} notes · ${t.status}`+
      (t.span?`\n${t.span[0]} → ${t.span[1]}`:"")+(t.summary?`\n\n${t.summary}`:"");};
  function draw(){
    chips.querySelectorAll(".chip").forEach(c=>c.className="chip"+(c.textContent===filter?" on":""));
    let ts=all.filter(t=>filter==="all"?true:filter==="muted"?t.muted:t.status===filter&&!t.muted);
    ts.sort((a,b)=>sortBy==="notes"?b.notes-a.notes:
      sortBy==="recent"?((b.span?b.span[1]:"")<(a.span?a.span[1]:"")?-1:1):b.sessions-a.sessions);
    // bubbles
    const W=540;let x=10,y=10,rowH=0;const parts=[];
    ts.forEach((t,i)=>{const r=Math.max(10,Math.min(44,6+t.sessions*2.4));
      if(x+2*r>W-10){x=10;y+=rowH+6;rowH=0;}
      const cx=x+r,cy=y+r;x+=2*r+6;rowH=Math.max(rowH,2*r);
      parts.push(`<g class="${t.muted?"muted-b":""}" style="cursor:pointer" data-i="${i}">
        <circle cx="${cx}" cy="${cy}" r="${r}" fill="${SC[t.status]||"var(--faint)"}" fill-opacity=".9"></circle>
        ${r>18?`<text x="${cx}" y="${cy+4}" text-anchor="middle" font-size="9">${t.label.slice(0,Math.floor(r/3.5))}</text>`:""}</g>`);});
    left.querySelectorAll("svg").forEach(s=>s.remove());
    left.insertAdjacentHTML("beforeend",`<svg viewBox="0 0 ${W} ${y+rowH+14}">${parts.join("")}</svg>`);
    left.querySelectorAll("g[data-i]").forEach(g=>g.onclick=()=>show(ts[+g.dataset.i]));
    // list
    listBox.innerHTML="";
    const tbl=el("table",{class:"tlist"},el("tr",{},...["theme","status","sessions","notes","last"].map(h=>el("th",{},h))));
    ts.forEach(t=>{const tr=el("tr",{onclick:()=>show(t)},
      el("td",{},t.label+(t.muted?" 🔇":"")),
      el("td",{},el("span",{class:"tag "+t.status},t.status)),
      el("td",{},String(t.sessions)),el("td",{},String(t.notes)),
      el("td",{},t.span?t.span[1]:"—"));tbl.append(tr);});
    listBox.append(tbl);}
  draw();wrap.append(left,right);m.append(wrap);},

async Connections(m){const d=await api("links");m.innerHTML="";
  // HERO VIEW: the rediscoveries themselves, ranked. The graph is secondary.
  const hero=el("div",{});
  const head=el("div",{style:"display:flex;align-items:baseline;gap:12px;margin-bottom:12px"},
    el("h2",{style:"margin:0"},"your rediscoveries — strongest bridges first"),
    el("span",{class:"chip",onclick:()=>{graphPanel.style.display=graphPanel.style.display==="none"?"block":"none";}},"toggle graph"));
  hero.append(head);
  const mo=d=>d==null?"":d>=60?`${Math.round(d/30)} months apart`:d>=14?`${Math.round(d/7)} weeks apart`:`${d} days apart`;
  (d.bridges||[]).forEach(b=>{
    const cross=b.from.source!==b.to.source;
    const headline=[cross?`${b.from.source} ↔ ${b.to.source}`:b.from.source,
                    mo(b.gap_days)].filter(Boolean).join(" · ");
    // the gold node marks the confluence (the found thing); the story stays in ink text
    hero.append(el("div",{class:"bridge"},
      el("div",{class:"head"},el("span",{class:"node"}),el("span",{class:"join"},"⋈"),el("span",{},headline)),
      el("div",{class:"side"},el("div",{},b.from.text),
        el("div",{class:"src"},`${b.from.source}${b.from.date?" · "+b.from.date:""}${b.from.theme?" · "+b.from.theme:""}`)),
      el("div",{class:"side"},el("div",{},b.to.text),
        el("div",{class:"src"},`${b.to.source}${b.to.date?" · "+b.to.date:""}${b.to.theme?" · "+b.to.theme:""}`)),
      b.why?el("div",{class:"why"},"why: "+b.why):""));});
  if(!(d.bridges||[]).length)hero.append(el("div",{class:"hint"},"no bridges yet — run alluvia refresh"));
  m.append(hero);
  const graphPanel=el("div",{class:"panel",style:"display:none"},el("h2",{},"bridge graph — click an edge"));
  m.append(graphPanel);
  const panel=graphPanel;
  const ids=new Set();d.edges.forEach(e=>{ids.add(e.a);ids.add(e.b);});
  const nodes=d.nodes.filter(n=>ids.has(n.id));
  const W=1120,H=520,cx=W/2,cy=H/2,R=Math.min(W,H)/2-70;
  const pos={};nodes.forEach((n,i)=>{const a=2*Math.PI*i/nodes.length-Math.PI/2;
    pos[n.id]=[cx+R*Math.cos(a),cy+R*Math.sin(a)];});
  const detail=el("div",{class:"detail"},"…");
  const edges=d.edges.filter(e=>pos[e.a]&&pos[e.b]).map((e,i)=>{const[x1,y1]=pos[e.a],[x2,y2]=pos[e.b];
    return`<line data-e="${i}" x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="var(--edge)"
      stroke-opacity="${Math.min(1,.35+e.max_weight/4)}" stroke-width="${Math.min(6,e.count+1)}" style="cursor:pointer"></line>`;}).join("");
  const circles=nodes.map(n=>{const[x,y]=pos[n.id];const lbl=(d.nodes.find(v=>v.id===n.id)||{}).label||n.id;
    return`<circle cx="${x}" cy="${y}" r="${Math.max(5,Math.min(16,4+n.sessions))}" fill="${SC[n.status]||"var(--faint)"}"></circle>
      <text x="${x}" y="${y-14}" text-anchor="middle" font-size="10">${lbl.slice(0,18)}</text>`;}).join("");
  panel.insertAdjacentHTML("beforeend",`<svg id="graph" viewBox="0 0 ${W} ${H}">${edges}${circles}</svg>`);
  panel.append(detail);
  const E=d.edges.filter(e=>pos[e.a]&&pos[e.b]);
  panel.querySelectorAll("line[data-e]").forEach(l=>l.onclick=()=>{const e=E[+l.dataset.e];const s=e.sample||{};
    detail.textContent=`${e.count} bridge(s), max weight ${e.max_weight}\n\n`+
      (s.from?`[${s.from.source}] ${s.from.text}\n   ↔\n[${s.to.source}] ${s.to.text}`:"")+
      (s.why?`\n\nwhy: ${s.why}`:"");});
  if(!E.length)detail.textContent="no cross-theme bridges yet — run alluvia refresh";},

async Timeline(m){const d=await api("timeline");m.innerHTML="";
  const panel=el("div",{class:"panel"},el("h2",{},"sessions per week by source · unfinished arcs below"));
  const weeks=d.weeks;const srcs=[...new Set(weeks.flatMap(w=>Object.keys(w.by_source)))];
  const W=1120,bw=Math.max(4,Math.min(24,Math.floor(W/Math.max(weeks.length,1))-2));
  const maxN=Math.max(1,...weeks.map(w=>Object.values(w.by_source).reduce((a,b)=>a+b,0)));
  let bars="";weeks.forEach((w,i)=>{let y=170;
    srcs.forEach((s,si)=>{const v=w.by_source[s]||0;if(!v)return;const h=v/maxN*150;y-=h;
      bars+=`<rect x="${10+i*(bw+2)}" y="${y}" width="${bw}" height="${h}" fill="${srcColor(si)}"><title>${w.week} ${s}: ${v}</title></rect>`;});});
  const legend=srcs.map((s,si)=>`<tspan fill="${srcColor(si)}">■ ${s}  </tspan>`).join("");
  const arcs=d.arcs.slice(0,12);
  let arcSvg="";arcs.forEach((a,i)=>{arcSvg+=`<text x="10" y="${205+i*16}" font-size="10" fill="${a.status==="open"?"var(--st-open)":"var(--muted)"}">${a.start} ─ ${a.end}  ${a.label} (${a.sessions})</text>`;});
  panel.insertAdjacentHTML("beforeend",
    `<svg id="tl" viewBox="0 0 ${W} ${215+arcs.length*16}">
       <text x="10" y="14" font-size="11" font-family="var(--mono)">${legend}</text>${bars}
       <line x1="8" y1="171" x2="${W-8}" y2="171" stroke="var(--line)"></line>${arcSvg}</svg>`);
  m.append(panel);},

async Judgments(m){const p=await api("proposals"),g=await api("digests");m.innerHTML="";
  const row=el("div",{class:"row"});
  const t1=el("div",{class:"panel"},el("h2",{},"proposals"));
  const tbl=el("table",{},el("tr",{},...["title","feas","outcome","via","note"].map(h=>el("th",{},h))));
  p.proposals.forEach(x=>tbl.append(el("tr",{},
    el("td",{},x.title),el("td",{},x.feasibility==null?"?":x.feasibility+"/5"),
    el("td",{},el("span",{class:"tag "+x.outcome},x.outcome+(x.reject_reason?" ("+x.reject_reason+")":""))),
    el("td",{},x.rated_via||""),el("td",{},x.rating_note||""))));
  t1.append(tbl);
  const t2=el("div",{class:"panel"},el("h2",{},"digest history"));
  g.digests.forEach(d=>{t2.append(el("div",{},el("strong",{},"digest #"+d.id)));
    d.items.forEach(i=>t2.append(el("div",{class:"detail"},`${i.n}. [${i.outcome}] ${i.snapshot.slice(0,160)}`)));});
  if(!g.digests.length)t2.append(el("div",{class:"hint"},"no digests yet — alluvia digest run --force"));
  row.append(t1,t2);m.append(row);},
};
render();

// ---- search ----
const q=$("#q"),results=$("#results");let debounce=null;
document.addEventListener("keydown",e=>{if(e.key==="/"&&document.activeElement!==q){e.preventDefault();q.focus();}
  if(e.key==="Escape"){results.style.display="none";q.blur();}});
q.addEventListener("input",()=>{clearTimeout(debounce);debounce=setTimeout(doSearch,250);});
async function doSearch(){const term=q.value.trim();
  if(!term){results.style.display="none";return;}
  results.style.display="block";results.textContent="panning…";
  const r=await(await fetch("/api/search?q="+encodeURIComponent(term))).json();
  results.innerHTML="";
  (r.themes||[]).forEach(t=>results.append(el("div",{class:"r",onclick:()=>{state.tab="Themes";render();results.style.display="none";}},
    el("span",{class:"tag "+t.status},t.status)," ",el("strong",{},t.label),
    el("div",{class:"m"},`theme · ${t.sessions} sessions`))));
  (r.notes||[]).forEach(n=>results.append(el("div",{class:"r"},
    el("div",{},n.text),
    el("div",{class:"m"},`${n.source}${n.date?" · "+n.date:""}${n.theme?" · "+n.theme.label:""} · ${n.kind}`))));
  if(!(r.themes||[]).length&&!(r.notes||[]).length)results.textContent="the pan came up empty — try other words";}
</script>
